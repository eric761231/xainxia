name: xianxia_game
description: "A new Flutter project."

# 下列設定可避免套件被意外發佈到 pub.dev（使用 `flutter pub publish`）。
# 這對私人專案較為建議。
publish_to: 'none' # 若要發佈到 pub.dev，請移除此行

# 下列為應用程式的版本與建置編號設定說明。
# 版本號由三個以點號分隔的數字組成，例如 1.2.43，之後可接加號與建置編號。
# 在執行 `flutter build` 時，可分別以 `--build-name` 與 `--build-number` 覆寫這兩個欄位。
# 在 Android 上，build-name 對應到 versionName，build-number 對應到 versionCode。
# 有關 Android 版本號詳情，請參考：https://developer.android.com/studio/publish/versioning
# 在 iOS 上，build-name 對應到 CFBundleShortVersionString，build-number 對應到 CFBundleVersion。
# 有關 iOS 版本資訊，請參考 Apple 文件：
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# 在 Windows 上，build-name 會用於產品與檔案版本的 major/minor/patch 部分，build-number 作為建置後綴。
version: 1.0.0+1

environment:
  sdk: ^3.12.1

# Dependencies 欄位用來指定本套件運作所需的其他套件。
# 若要自動將相依套件升級到最新版本，可執行 `flutter pub upgrade --major-versions`。
# 或者也可手動在下方更新版本號至 pub.dev 上的最新版本。要檢查哪些相依有更新，請執行 `flutter pub outdated`。
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  xml: ^6.5.0
  # Flame 是一個專為 Flutter 設計的遊戲引擎，提供了豐富的功能來幫助開發者創建 2D 遊戲。
  flame: ^1.6.0
  flutter_native_splash: ^2.4.8

# Flame Engine 引擎套件（遊戲核心功能，含渲染、輸入、物理等）
# flame: ^1.15.0

# Flame 擴充套件（遊戲需要的功能）
# flame_forge2d: ^0.19.0   # 物理引擎（選用）
# flame_audio: ^3.0.0     # 音訊處理（選用）

#Flame核心功能擴展
flame_forge2d: ^0.19.0   #物理引擎，用於物體碰撞和運動（選用）
flame_audio: ^3.0.0     #音訊處理，用於背景音樂和音效（選用）

# 💡 在這裡加入套件設定
flutter_native_splash:
  # 設定啟動時的底色（用黑色防漏光）
  color: "#000000"
  
  # 💡 關鍵：把你的修仙背景圖設定在 backgroundImage
  background_image: "assets/images/launch_bg.png"
  
  # 防呆設定：確保在 Android 12+ 設備上也能完美全螢幕顯示
  android_12:
    color: "#000000"
    background_image: "assets/images/launch_bg.png"
    
  # 讓背景圖強制撐滿全螢幕不留白邊
  fullscreen: true

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 下方的 `flutter_lints` 套件提供一組建議的 lints 規則，以鼓勵良好程式撰寫習慣。
  # 這組 lint 規則會在專案根目錄的 `analysis_options.yaml` 中啟用。要停用或啟用特定規則，請編輯該檔案。
  flutter_lints: ^6.0.0

# 有關 pubspec 文件中 Dart 通用設定的說明，請參閱：
# https://dart.dev/tools/pub/pubspec

# 以下區段為 Flutter 專案專用設定。
flutter:

  # 下列設定會將 Material Icons 字型一併打包到應用程式，
  # 以便於在程式中使用 `Icons` 內建圖示。
  uses-material-design: true

  # 若要新增資源（assets）到應用程式，請在此加入 assets 區段，例如：
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  assets:
    - assets/images/
    - assets/font/
    - assets/ui/common/
    - assets/ui/layouts/
    - assets/ui/char_create/
    - assets/ui/natal_weapons/
    - assets/characters/
    - assets/data/server_connection.json
    - assets/data/app_config.json
    - assets/data/character_sprites.json
    - assets/tiles/
    - assets/maps/

  # 圖片資源可以包含多個對應解析度的「變體」，詳見：
  # https://flutter.dev/to/resolution-aware-images

  # 若要從其他套件中使用資源，請參考：
  # https://flutter.dev/to/asset-from-package

  # 若要新增自訂字型，請在此 `flutter` 區段加入 fonts 設定。清單中每個項目應包含
  # 一個 `family`（字型家族名稱）以及 `fonts`（列出字型檔與其屬性）的設定。例如：
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  # 有關從套件依賴加入字型的細節請參考：
  # https://flutter.dev/to/font-from-package
  fonts:
    - family: KingHwaOldSongMN
      fonts:
        - asset: assets/font/KingHwaOldSong-MN.ttf
    # 以下 2 個字型目前程式碼未使用，先註冊為可用 family 供日後套用。
    - family: HuangKaiLvShiShouXieTi
      fonts:
        - asset: assets/font/HuangKaiLvShiShouXieTi.ttf
    - family: HuangKaiHuaLawyer
      fonts:
        - asset: assets/font/huangkaihuaLawyerfont-2.ttf
